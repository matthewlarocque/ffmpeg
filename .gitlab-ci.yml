include:
  - project: 'freedesktop/ci-templates'
    ref: 'master'
    file: '/templates/debian.yml'

default:
  interruptible: true

# Is it worth making an image with ffmpeg git repo and packages installed?
stages:
  - 'image-build'
  - 'build'

.container.debian@common:
  variables:
    FDO_DISTRIBUTION_VERSION: "bookworm-slim"
    FDO_UPSTREAM_REPO: "gstreamer/meson-ports/ffmpeg"
    FDO_DISTRIBUTION_PACKAGES: >-
      python3-setuptools
      python3-pip
      ninja-build
      build-essential
      git

.container.debian@common.minimum:
  extends: '.container.debian@common'
  variables:
    FDO_DISTRIBUTION_TAG: "2025-05-07.1-meson-7.1-minimum"
    FDO_DISTRIBUTION_EXEC: >-
      export PIP_BREAK_SYSTEM_PACKAGES=1 &&
      python3 -m pip install --upgrade pip &&
      python3 -m pip install meson

.container.debian@common.full:
  extends: '.container.debian@common'
  variables:
    FDO_DISTRIBUTION_TAG: "2025-05-07.1-meson-7.1-full"
    FDO_DISTRIBUTION_EXEC: >-
      export PIP_BREAK_SYSTEM_PACKAGES=1 &&
      python3 -m pip install --upgrade pip &&
      python3 -m pip install meson &&
      echo "deb-src http://deb.debian.org/debian bookworm main" >> /etc/apt/sources.list &&
      apt-get update &&
      apt-get build-dep --yes ffmpeg &&
      apt-get install --yes liblzo2-dev

debian-container-build@x86_64@minimum:
  extends:
    - '.fdo.container-build@debian@x86_64'
    - '.container.debian@common.minimum'
  stage: 'image-build'
  tags:
    - kvm

debian-container-build@x86_64@full:
  extends:
    - '.fdo.container-build@debian@x86_64'
    - '.container.debian@common.full'
  stage: 'image-build'
  tags:
    - kvm

.build:
  stage: 'build'
  script:
    - meson ${MESON_OPTIONS} build/
    - stat build/build.ninja
    - ninja -C build/
    - ninja -C build/ test
    - ninja -C build/ install
  artifacts:
    when: on_failure
    paths:
      - build/meson-logs/
      - build/*.build

.build nodeps:
  extends:
    - '.build'
    - '.container.debian@common.minimum'
    - '.fdo.distribution-image@debian'
  variables:
    MESON_OPTIONS: '--auto-features=disabled'

.build withdeps:
  extends:
    - '.build'
    - '.container.debian@common.full'
    - '.fdo.distribution-image@debian'

.build withdepsnoyasm:
  extends: '.build withdeps'
  before_script:
    - apt-get remove --yes nasm
    - apt-get update
    - apt-get install --yes yasm

no external deps:
  extends: '.build nodeps'

with deps:
  extends: '.build withdeps'

with deps yasm:
  extends: '.build withdepsnoyasm'

.build@i386.common:
  image:
    name: 'debian:bookworm'
    docker:
      platform: linux/i386
  tags: ['gstreamer']
  variables:
    DEPENDENCIES: >-
      python3-pip
      python3-setuptools
      ninja-build
      build-essential
      git

no external@i386:
  extends:
    - '.build nodeps'
    - '.build@i386.common'
  before_script:
    - apt-get update
    - apt-get install --yes ${DEPENDENCIES}
    - export PIP_BREAK_SYSTEM_PACKAGES=1
    - python3 -m pip install --upgrade pip
    - python3 -m pip install meson

with deps@i386:
  extends:
    - '.build withdeps'
    - '.build@i386.common'
  before_script:
    - echo "deb-src http://deb.debian.org/debian bookworm main" >> /etc/apt/sources.list
    - apt-get update
    - apt-get build-dep --yes ffmpeg
    - apt-get install --yes ${DEPENDENCIES}
    - export PIP_BREAK_SYSTEM_PACKAGES=1
    - python3 -m pip install --upgrade pip
    - python3 -m pip install meson

.build windows:
  image: "registry.freedesktop.org/gstreamer/gstreamer/amd64/windows:2025-03-12.0-1.26"
  stage: 'build'
  tags:
    - 'docker'
    - 'windows'
    - '2022'
  variables:
    # Make sure any failure in PowerShell scripts is fatal
    ErrorActionPreference: 'Stop'
    WarningPreference: 'Stop'
    # Uncomment the following key if need to pass custom args, as well with the
    # $env:MESON_ARGS line in the `script:` blocks
    # MESON_ARGS: >-
    #   -Dfoo=enabled
    #   -Dbar=disabled
  before_script:
    - pip3 install -U meson
  script:
    # For some reason, options are separated by newline instead of space, so we
    # have to replace them first.
    # - $env:MESON_ARGS = $env:MESON_ARGS.replace("`n"," ")
    # Gitlab executes PowerShell in docker, but VsDevCmd.bat is a batch script.
    # Environment variables substitutions is done by PowerShell before calling
    # cmd.exe, that's why we use $env:FOO instead of %FOO%
    - cmd.exe /C "C:\BuildTools\Common7\Tools\VsDevCmd.bat -host_arch=amd64 -arch=$env:ARCH &&
        meson build $env:MESON_ARGS &&
        ninja -C build &&
        ninja -C build test"

vs2019:
  extends: '.build windows'
  variables:
    ARCH: 'amd64'

vs2019 no-optimization debug:
  extends: '.build windows'
  variables:
    ARCH: 'amd64'
    MESON_ARGS: '--optimization=0 --debug'

# VS 2019 with a number of features disabled, as they might be by consumers that only need a subset of ffmpeg's features.
# Also verifies that the ffmpeg build is useable even with "debug build" settings
vs2019 no-optimization debug feature-customization:
  extends: '.build windows'
  variables:
    ARCH: 'amd64'
    MESON_ARGS: '--optimization=0 --debug -D encoders=disabled -D muxers=disabled -D programs=enabled -D tests=disabled -D avdevice=disabled'

vs2019 x86:
  extends: '.build windows'
  stage: 'build'
  variables:
    ARCH: 'x86'
  artifacts:
    paths:
      - build1/meson-logs/
      - build2/meson-logs/
  script:
    # MSVC hangs while linking with -Dasm=enabled (default), so only run setup with -Dasm=enabled
    - cmd.exe /C "C:\BuildTools\Common7\Tools\VsDevCmd.bat -host_arch=amd64 -arch=$env:ARCH &&
        meson build1 $env:MESON_ARGS"
    - cmd.exe /C "C:\BuildTools\Common7\Tools\VsDevCmd.bat -host_arch=amd64 -arch=$env:ARCH &&
        meson build2 $env:MESON_ARGS -Dasm=disabled && ninja -C build2 && ninja -C build2 test"

vs2019 arm64 cross:
  extends: '.build windows'
  stage: 'build'
  variables:
    ARCH: 'arm64'
    MESON_ARGS: '--cross-file ci/vs-arm64-cross-file.txt'

.build darwin:
  stage: 'build'
  image: "registry.freedesktop.org/gstreamer/gstreamer/macos-arm64/15-sequoia:2024-10-28.0"
  tags:
    - gst-mac-arm
  artifacts:
    name: "${CI_JOB_NAME}_${CI_COMMIT_SHA}"
    expire_in: '5 days'
    when: 'always'
    paths:
      - "build/meson-logs/*txt"
  before_script:
    - pip3 install --upgrade pip
    - pip3 install -U meson ninja
  script:
    - meson setup build
    - meson compile -C build
    - meson test -C build

macOS arm64:
  extends: '.build darwin'
  stage: 'build'

iOS arm64 cross:
  extends: '.build darwin'
  stage: 'build'
  script:
    - |
      cat > ios-cross-file.txt <<EOF
      [host_machine]
      system = 'darwin'
      subsystem = 'ios'
      cpu_family = 'aarch64'
      cpu = 'aarch64'
      endian = 'little'

      [properties]
      c_args =      ['-arch', 'arm64', '--sysroot=$(xcrun --sdk iphoneos --show-sdk-path)', '-miphoneos-version-min=11.0']
      cpp_args =      ['-arch', 'arm64', '--sysroot=$(xcrun --sdk iphoneos --show-sdk-path)', '-miphoneos-version-min=11.0']
      c_link_args = ['-arch', 'arm64', '--sysroot=$(xcrun --sdk iphoneos --show-sdk-path)', '-miphoneos-version-min=11.0']
      cpp_link_args = ['-arch', 'arm64', '--sysroot=$(xcrun --sdk iphoneos --show-sdk-path)', '-miphoneos-version-min=11.0']
      objc_args =      ['-arch', 'arm64', '--sysroot=$(xcrun --sdk iphoneos --show-sdk-path)', '-miphoneos-version-min=11.0']
      objc_link_args = ['-arch', 'arm64', '--sysroot=$(xcrun --sdk iphoneos --show-sdk-path)', '-miphoneos-version-min=11.0']
      needs_exe_wrapper = true

      [binaries]
      ar        = '$(xcrun --find --sdk iphoneos ar)'
      c         = '$(xcrun --find --sdk iphoneos clang)'
      objc         = '$(xcrun --find --sdk iphoneos clang)'
      cpp       = '$(xcrun --find --sdk iphoneos clang++)'
      ranlib    = '$(xcrun --find --sdk iphoneos ranlib)'
      strip     = '$(xcrun --find --sdk iphoneos strip)'
      pkgconfig = 'false'
      EOF
    - meson setup build --cross-file=ios-cross-file.txt
    - meson compile -C build
    - meson test -C build

.build android:
  image: 'registry.freedesktop.org/gstreamer/cerbero/android:2024-11-01.0'
  stage: 'build'
  artifacts:
    name: "${CI_JOB_NAME}_${CI_COMMIT_SHA}"
    expire_in: '5 days'
    when: 'always'
    paths:
      - "build/meson-logs/*txt"
  variables:
    ANDROID_SDK: '/android/sdk'
    ANDROID_NDK: '/android/ndk'
    ANDROID_API: '21'
    TOOLCHAIN: "$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64"
  before_script:
    - dnf install -y python3-pip binutils nasm gcc ninja-build
    - pip3 install -U meson
  script:
    - |
      cat > android-cross-file.txt <<EOF
      [host_machine]
      system = 'android'
      cpu_family = '$ARCH'
      cpu = '$ARCH'
      endian = 'little'

      [constants]
      toolchain = '$TOOLCHAIN'
      clang_arch = '$CLANG_ARCH'
      android_host = '$ANDROID_HOST'
      android_api = '$ANDROID_API'

      [properties]
      sys_root = '$ANDROID_NDK/sysroot'

      [binaries]
      ar        = toolchain + '/bin/llvm-ar'
      c         = [toolchain + '/bin/clang', '-target', clang_arch + '-linux-' + android_host + android_api]
      cpp       = [toolchain + '/bin/clang++', '-target', clang_arch + '-linux-' + android_host + android_api]
      ranlib    = toolchain + '/bin/llvm-ranlib'
      strip     = toolchain + '/bin/llvm-strip'
      pkgconfig = 'false'
      EOF
    - meson setup build --cross-file android-cross-file.txt
    - meson compile -C build

android arm64 cross:
  extends: '.build android'
  stage: 'build'
  variables:
    ARCH: 'aarch64'
    CLANG_ARCH: 'aarch64'
    ANDROID_HOST: 'android'

android armv7 cross:
  extends: '.build android'
  stage: 'build'
  variables:
    ARCH: 'arm'
    CLANG_ARCH: 'armv7a'
    ANDROID_HOST: 'androideabi'
